<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS · 157 Team</title>
<link rel="icon" href="assets/ico.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --bg:#05070c;
  --bg-2:#080b13;
  --bg-3:#0c1019;
  --panel:rgba(255,255,255,.035);
  --panel-strong:rgba(255,255,255,.065);
  --border:rgba(255,255,255,.08);
  --border-strong:rgba(255,255,255,.16);
  --cyan:#4fd8ff;
  --cyan-dim:rgba(79,216,255,.16);
  --amber:#ffb547;
  --amber-dim:rgba(255,181,71,.16);
  --text:#eef2f7;
  --text-dim:#8a93a6;
  --text-faint:#4d5566;
  --danger:#ff5d6a;
  --danger-dim:rgba(255,93,106,.14);
  --success:#3ddc97;
  --r-sm:10px; --r-md:16px; --r-lg:24px; --r-xl:32px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body.light{
  --bg:#f3f5f9; --bg-2:#ffffff; --bg-3:#eef1f6;
  --panel:rgba(10,15,30,.03); --panel-strong:rgba(10,15,30,.06);
  --border:rgba(10,15,30,.08); --border-strong:rgba(10,15,30,.16);
  --text:#0e131d; --text-dim:#565f70; --text-faint:#9aa3b4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
  transition:background .35s ease,color .3s ease;
}
::selection{background:var(--cyan-dim);color:var(--text)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
a{color:inherit}
button,input,textarea,select{font-family:inherit}
img{max-width:100%;display:block}
.wrap{max-width:1240px;margin:0 auto;padding:0 28px}
.eyebrow{
  font-family:var(--font-mono);font-size:.72rem;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--cyan);display:inline-flex;align-items:center;gap:8px;
}
.eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.02em;line-height:1.08}
.section{padding:104px 0}
.section-head{max-width:640px;margin-bottom:52px}
.section-head h2{font-size:clamp(2rem,3.4vw,2.75rem);font-weight:700;margin:14px 0 12px}
.section-head p{color:var(--text-dim);font-size:1rem;line-height:1.7}
.mono{font-family:var(--font-mono)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:9px;font-family:var(--font-body);font-weight:600;
  font-size:.88rem;padding:13px 24px;border-radius:100px;cursor:pointer;border:1px solid transparent;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease,background .2s ease,border-color .2s ease;
  text-decoration:none;white-space:nowrap;
}
.btn-solid{background:var(--cyan);color:#04121a;box-shadow:0 8px 28px rgba(79,216,255,.22)}
.btn-solid:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(79,216,255,.32)}
.btn-ghost{background:var(--panel);border-color:var(--border-strong);color:var(--text);backdrop-filter:blur(12px)}
.btn-ghost:hover{background:var(--panel-strong);transform:translateY(-2px)}
.btn-danger{background:var(--danger-dim);border-color:rgba(255,93,106,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(255,93,106,.22)}
.btn-sm{padding:9px 16px;font-size:.78rem}
.btn-block{width:100%;justify-content:center}
.icon-btn{
  width:38px;height:38px;border-radius:11px;background:var(--panel);border:1px solid var(--border);
  color:var(--text-dim);display:grid;place-items:center;cursor:pointer;transition:.2s;flex-shrink:0;font-size:.85rem;
}
.icon-btn:hover{color:var(--text);border-color:var(--border-strong);background:var(--panel-strong)}

/* Glass panel */
.panel{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);
  backdrop-filter:blur(20px) saturate(140%);
}

/* Header */
header{position:sticky;top:0;z-index:200;background:color-mix(in srgb, var(--bg) 80%, transparent);backdrop-filter:blur(22px) saturate(160%);border-bottom:1px solid var(--border)}
.nav{display:flex;align-items:center;height:72px;gap:18px}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0}
.logo-name{font-family:var(--font-display);font-weight:700;font-size:1.05rem;letter-spacing:-.01em}
.logo-name span{color:var(--cyan)}
.nav-links{display:flex;gap:2px;margin-left:20px}
.nav-links a{
  font-size:.84rem;font-weight:500;color:var(--text-dim);text-decoration:none;padding:8px 14px;
  border-radius:9px;transition:.2s;
}
.nav-links a:hover{color:var(--text);background:var(--panel)}
.nav-end{display:flex;align-items:center;gap:8px;margin-left:auto}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer}
.avatar-btn{width:38px;height:38px;border-radius:50%;overflow:hidden;border:1px solid var(--border-strong);cursor:pointer;background:var(--cyan-dim);display:grid;place-items:center;font-weight:700;font-size:.8rem;color:var(--cyan);flex-shrink:0}
.avatar-btn img{width:100%;height:100%;object-fit:cover}
.mobile-nav{display:none;flex-direction:column;gap:2px;padding:12px;border-top:1px solid var(--border)}
.mobile-nav.open{display:flex}
.mobile-nav a{padding:12px 14px;border-radius:10px;color:var(--text-dim);text-decoration:none;font-size:.9rem}
.mobile-nav a:hover{background:var(--panel);color:var(--text)}
.cart-dot{position:absolute;top:-4px;right:-4px;background:var(--amber);color:#241300;font-size:.6rem;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 3px}

/* Hero */
.hero{padding:88px 0 60px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
.hero h1{font-size:clamp(2.5rem,5vw,3.6rem);font-weight:700;margin:18px 0 20px}
.hero h1 em{font-style:normal;color:var(--cyan)}
.hero p.lead{color:var(--text-dim);font-size:1.05rem;line-height:1.75;max-width:480px;margin-bottom:32px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px}
.hero-mini-stats{display:flex;gap:28px;flex-wrap:wrap}
.hero-mini-stats div strong{display:block;font-family:var(--font-display);font-size:1.35rem}
.hero-mini-stats div span{font-size:.72rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em}

/* Core HUD panel (signature element) */
.hud{padding:26px;position:relative}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hud-top .mono{font-size:.68rem;color:var(--text-faint);letter-spacing:.08em}
.hud-core-wrap{display:flex;justify-content:center;padding:18px 0 6px}
.hud-readout{border-top:1px solid var(--border);margin-top:18px;padding-top:16px;display:flex;flex-direction:column;gap:9px}
.hud-line{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.74rem}
.hud-line span:first-child{color:var(--text-faint)}
.hud-line span:last-child{color:var(--text)}
.hud-line .ok{color:var(--success)}

/* Stats bar */
.statbar{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--panel)}
.statbar .stat{padding:24px 14px;text-align:center;border-right:1px solid var(--border)}
.statbar .stat:last-child{border-right:none}
.stat-n{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--cyan)}
.stat-l{font-size:.66rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.09em;margin-top:4px}

/* Carousel */
.carousel{position:relative;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);height:440px;background:#000}
.carousel-track{position:relative;width:100%;height:100%}
.carousel-slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease}
.carousel-slide.active{opacity:1}
.carousel-media{width:100%;height:100%;object-fit:cover;background-size:cover;background-position:center;display:block}
.carousel-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(2,4,8,.9));pointer-events:none}
.carousel-info{position:absolute;left:30px;right:30px;bottom:26px;z-index:2}
.carousel-info h3{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:6px}
.carousel-info p{color:rgba(255,255,255,.6);font-size:.85rem}
.carousel-badge{position:absolute;top:14px;left:14px;z-index:3;background:rgba(2,4,8,.65);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.carousel-badge.vid{color:var(--amber);border-color:var(--amber-dim)}
.carousel-badge.img{color:var(--cyan);border-color:var(--cyan-dim)}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(2,4,8,.55);backdrop-filter:blur(14px);border:1px solid var(--border);color:#fff;display:grid;place-items:center;cursor:pointer;z-index:4;transition:.2s}
.carousel-arrow:hover{background:var(--cyan);color:#04121a}
.carousel-arrow.left{left:14px}
.carousel-arrow.right{right:14px}
.carousel-dots{display:flex;gap:7px;justify-content:center;margin-top:16px}
.carousel-dot{width:7px;height:7px;border-radius:4px;background:var(--border-strong);cursor:pointer;transition:.3s;border:none}
.carousel-dot.active{width:26px;background:var(--cyan)}
@media(max-width:760px){.carousel{height:280px}.carousel-info{left:18px;right:18px;bottom:16px}.carousel-info h3{font-size:1.1rem}}

/* Products */
.cat-tabs{display:flex;gap:8px;margin-bottom:32px}
.cat-tab{
  font-family:var(--font-mono);font-size:.76rem;padding:9px 18px;border-radius:100px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;transition:.2s;
}
.cat-tab.active,.cat-tab:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:22px}
.prod-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),border-color .3s;display:flex;flex-direction:column;
}
.prod-card:hover{transform:translateY(-6px);border-color:var(--border-strong)}
.prod-thumb{aspect-ratio:16/10;position:relative;overflow:hidden;background:var(--bg-3)}
.prod-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.prod-card:hover .prod-thumb img{transform:scale(1.05)}
.prod-thumb .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.6rem}
.prod-tag{position:absolute;top:12px;left:12px;font-family:var(--font-mono);font-size:.62rem;letter-spacing:.08em;padding:4px 10px;border-radius:6px;text-transform:uppercase;font-weight:700}
.prod-tag.free{background:rgba(61,220,151,.16);color:var(--success)}
.prod-tag.premium{background:var(--amber-dim);color:var(--amber)}
.prod-rating{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);padding:4px 9px;border-radius:8px;font-size:.72rem;font-weight:700;color:var(--amber);display:flex;align-items:center;gap:4px}
.prod-body{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1}
.prod-body h3{font-size:1.05rem;font-weight:700}
.prod-body p{font-size:.83rem;color:var(--text-dim);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-foot{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border);font-size:.8rem;color:var(--text-dim)}
.prod-price{font-family:var(--font-mono);font-weight:700;color:var(--text)}

/* Comments */
.comment-banner{display:flex;gap:14px;align-items:center;padding:16px 20px;border:1px solid var(--amber-dim);background:var(--amber-dim);border-radius:var(--r-md);margin-bottom:26px}
.comment-banner i{color:var(--amber)}
.comment-banner p{font-size:.83rem;color:var(--text-dim)}
.comment-banner strong{color:var(--text)}
.comment-list{display:flex;flex-direction:column;gap:12px;max-height:560px;overflow-y:auto;padding-right:6px;margin-bottom:22px}
.comment-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px}
.c-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.c-avatar{width:34px;height:34px;border-radius:50%;background:var(--cyan-dim);color:var(--cyan);display:grid;place-items:center;font-weight:700;font-size:.78rem;cursor:pointer;overflow:hidden;flex-shrink:0}
.c-avatar img{width:100%;height:100%;object-fit:cover}
.c-author{font-weight:600;font-size:.86rem;cursor:pointer}
.c-date{margin-left:auto;font-size:.68rem;color:var(--text-faint);font-family:var(--font-mono)}
.c-text{font-size:.87rem;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.c-actions{display:flex;gap:6px;flex-wrap:wrap}
.c-actions button{
  background:none;border:1px solid transparent;color:var(--text-faint);font-size:.72rem;padding:5px 10px;
  border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.2s;
}
.c-actions button:hover{background:var(--panel-strong);color:var(--text-dim)}
.c-actions button.active{color:var(--cyan)}
.badge-tag{font-size:.58rem;font-weight:700;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em}
.badge-admin{background:var(--danger-dim);color:var(--danger)}
.badge-mod{background:var(--amber-dim);color:var(--amber)}
.badge-collab{background:var(--cyan-dim);color:var(--cyan)}
.replies{margin:10px 0 0 44px;padding-left:14px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:8px}
.reply-item{background:var(--panel-strong);border-radius:10px;padding:10px 12px}
.reply-item .c-author{font-size:.78rem}
.reply-item .c-text{font-size:.8rem;margin:0}
.reply-form{display:flex;gap:8px;margin-top:6px}
.reply-form input{flex:1}
.compose{display:flex;gap:14px;align-items:flex-start}
.field{
  width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:12px 15px;color:var(--text);font-size:.87rem;outline:none;transition:.2s;resize:vertical;
}
.field:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.locked-box{text-align:center;padding:36px 20px;border:1px dashed var(--border-strong);border-radius:var(--r-lg);color:var(--text-dim)}
.locked-box i{font-size:1.8rem;color:var(--text-faint);margin-bottom:12px;display:block}

/* Forum */
.forum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.forum-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;position:relative;transition:transform .3s}
.forum-card:hover{transform:translateY(-4px)}
.forum-img{width:100%;height:170px;object-fit:cover;background:var(--bg-3)}
.forum-img-ph{width:100%;height:170px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:2rem}
.forum-body{padding:18px}
.forum-body h4{font-size:.98rem;font-weight:700;margin-bottom:7px}
.forum-body p{font-size:.82rem;color:var(--text-dim);line-height:1.6;margin-bottom:12px}
.forum-meta{display:flex;gap:14px;font-size:.7rem;color:var(--text-faint);border-top:1px solid var(--border);padding-top:11px}
.forum-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:2}
.forum-actions button{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:.7rem;display:grid;place-items:center;backdrop-filter:blur(8px)}
.forum-form{padding:26px;margin-bottom:28px}
.forum-form h4{font-size:1rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.tabbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tabbtn{background:var(--panel-strong);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:.78rem;color:var(--text-dim);cursor:pointer;transition:.2s}
.tabbtn.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}
.dropzone{border:2px dashed var(--border-strong);border-radius:var(--r-md);padding:26px;text-align:center;cursor:pointer;position:relative;transition:.2s}
.dropzone:hover{border-color:var(--cyan)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dropzone i{font-size:1.7rem;color:var(--text-faint);margin-bottom:8px;display:block}

/* Features / Team */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.feat{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;transition:.3s}
.feat:hover{transform:translateY(-4px);border-color:var(--border-strong)}
.feat-ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;margin-bottom:16px;font-size:1.05rem}
.feat h3{font-size:.95rem;margin-bottom:7px}
.feat p{font-size:.82rem;color:var(--text-dim);line-height:1.6}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.team-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:30px 24px;text-align:center}
.t-avatar{width:60px;height:60px;border-radius:16px;display:grid;place-items:center;font-size:1.4rem;margin:0 auto 16px}
.team-card h3{font-size:1rem;margin-bottom:3px}
.t-role{font-family:var(--font-mono);font-size:.66rem;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.t-desc{font-size:.8rem;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.t-social{display:flex;gap:8px;justify-content:center}

/* Discord banner + footer */
.discord-banner{text-align:center;padding:56px 32px;position:relative;overflow:hidden}
.discord-banner h3{font-size:1.6rem;margin-bottom:10px}
.discord-banner p{color:var(--text-dim);margin-bottom:26px;max-width:440px;margin-left:auto;margin-right:auto}
footer{border-top:1px solid var(--border);padding:52px 0 30px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-grid h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:16px}
.footer-grid a{display:block;font-size:.83rem;color:var(--text-dim);text-decoration:none;margin-bottom:10px}
.footer-grid a:hover{color:var(--cyan)}
.f-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:.75rem;color:var(--text-faint)}

/* Modals / overlays */
.overlay{position:fixed;inset:0;z-index:900;background:rgba(2,4,8,.7);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg-2);border:1px solid var(--border-strong);border-radius:var(--r-lg);padding:28px;width:100%;max-width:480px;position:relative;max-height:90vh;overflow-y:auto;animation:modalIn .3s cubic-bezier(.2,.9,.3,1.2)}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-x{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:9px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;display:grid;place-items:center}
.modal-x:hover{color:var(--text)}
.modal h3{font-size:1.2rem;margin-bottom:8px}
.modal-sub{color:var(--text-dim);font-size:.85rem;margin-bottom:22px}
.status-msg{margin-top:14px;padding:11px 15px;border-radius:10px;font-size:.82rem;text-align:center;display:none}
.status-msg.show.error{display:block;background:var(--danger-dim);color:var(--danger)}
.status-msg.show.success{display:block;background:rgba(61,220,151,.12);color:var(--success)}

function CoreOrb({ size = 190, state = "idle" }) {
  const color = state === "listening" ? "var(--amber)" : "var(--cyan)";
  const bars = Array.from({ length: 5 });
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox="0 0 200 200" style={{ position: "absolute", inset: 0 }}>
        <circle cx="100" cy="100" r="92" fill="none" stroke="var(--border)" strokeWidth="1" />
        <circle cx="100" cy="100" r="72" fill="none" stroke="var(--border)" strokeWidth="1" strokeDasharray="4 7" />

          <span key={i} style={{

            height: 10 + (i % 3) * 8,
            animation: `orbBar ${0.9 + i * 0.12}s ease-in-out infinite`,
            animationDelay: `${i * 0.08}s`
          }} />
        ))}
      </div>
      <style>{`@keyframes orbBar{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.15)}}`}</style>
    </div>
  );
}

  { type: "image", src: "assets/a.png", title: "Nexus — Motor Neural Pro", desc: "Red neuronal multimodal con análisis predictivo." },

function Carousel() {
  const [cur, setCur] = useState(0);
  const timerRef = useRef(null);
  const videoRefs = useRef([]);

  function goTo(n) {
    setCur(((n % SLIDE_IMAGES.length) + SLIDE_IMAGES.length) % SLIDE_IMAGES.length);
  }
  function restart() {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => setCur(c => (c + 1) % SLIDE_IMAGES.length), 6000);
  }
  useEffect(() => { restart(); return () => clearInterval(timerRef.current); }, []);
  useEffect(() => {
    videoRefs.current.forEach((v, i) => {
      if (!v) return;
      if (i === cur) v.play().catch(() => {});
      else v.pause();
    });
  }, [cur]);

  return (
    <div className="wrap" style={{ marginTop: 8 }}>
      <div className="carousel rv vis">
        <div className="carousel-track">
          {SLIDE_IMAGES.map((s, i) => (
            <div className={`carousel-slide ${i === cur ? "active" : ""}`} key={i}>
              <span className={`carousel-badge ${s.type === "video" ? "vid" : "img"}`}>
                <i className={`fas fa-${s.type === "video" ? "play-circle" : "image"}`}></i> {s.type === "video" ? "Video" : "Foto"}
              </span>
              {s.type === "video" ? (
                <video ref={el => videoRefs.current[i] = el} className="carousel-media" muted loop playsInline poster={s.poster}>
                  <source src={s.src} type="video/mp4" />
                </video>
              ) : (
                <div className="carousel-media" style={{ backgroundImage: `url(${s.src})` }} />
              )}
              <div className="carousel-info"><h3>{s.title}</h3><p>{s.desc}</p></div>
            </div>
          ))}
        </div>
        <button className="carousel-arrow left" onClick={() => { goTo(cur - 1); restart(); }} aria-label="Anterior"><i className="fas fa-chevron-left"></i></button>
        <button className="carousel-arrow right" onClick={() => { goTo(cur + 1); restart(); }} aria-label="Siguiente"><i className="fas fa-chevron-right"></i></button>
      </div>
      <div className="carousel-dots">
        {SLIDE_IMAGES.map((_, i) => (
          <button key={i} className={`carousel-dot ${i === cur ? "active" : ""}`} onClick={() => { goTo(i); restart(); }} aria-label={`Ir a slide ${i + 1}`} />
        ))}
      </div>
    </div>
  );
}

const SYMBOLS = { USD: "$", COP: "COP$", EUR: "€", BRL: "R$" };
function convertPrice(price, currency) {

function getBadge(rank) {
  const map = { admin: ["👑 Admin","badge-admin"], moderator: ["🛡️ Moderador","badge-mod"], collaborator: ["🤝 Colaborador","badge-collab"] };
  return map[rank] || null;
}

function CommentItem({ c, onLike, onDislike, onReply, onEdit, onDelete, onOpenProfile }) {
  const { user } = useApp();
  const [replyOpen, setReplyOpen] = useState(false);
  const [replyText, setReplyText] = useState("");
  const isOwner = user && c.authorId === user.uid;
  const liked = user && (c.likes || []).includes(user.uid);
  const disliked = user && (c.dislikes || []).includes(user.uid);
  const badge = getBadge(c.authorRank);
  return (
    <div className="comment-item">
      <div className="c-head">
        <div className="c-avatar" onClick={() => onOpenProfile(c.authorId)}>{c.authorAvatar ? <img src={c.authorAvatar} /> : c.author[0].toUpperCase()}</div>
        <span className="c-author" onClick={() => onOpenProfile(c.authorId)}>{c.author}</span>
        {badge && <span className={`badge-tag ${badge[1]}`}>{badge[0]}</span>}
        <span className="c-date">{new Date(c.date).toLocaleString()}</span>
      </div>
      <div className="c-text">{c.text}</div>
      <div className="c-actions">
        <button className={liked ? "active" : ""} onClick={() => onLike(c)}><i className="fas fa-thumbs-up"></i> {(c.likes||[]).length}</button>
        <button className={disliked ? "active" : ""} onClick={() => onDislike(c)}><i className="fas fa-thumbs-down"></i> {(c.dislikes||[]).length}</button>
        <button onClick={() => setReplyOpen(v => !v)}><i className="fas fa-reply"></i> Responder</button>
        {isOwner && <button onClick={() => onEdit(c)}><i className="fas fa-pen"></i> Editar</button>}
        {isOwner && <button onClick={() => onDelete(c)}><i className="fas fa-trash"></i> Borrar</button>}
      </div>
      {(c.replies || []).length > 0 && (
        <div className="replies">
          {c.replies.map(r => (
            <div className="reply-item" key={r.id}>
              <div className="c-head" style={{ marginBottom: 4 }}><span className="c-author">{r.author}</span><span className="c-date">{new Date(r.date).toLocaleString()}</span></div>
              <div className="c-text">{r.text}</div>
            </div>
          ))}
        </div>
      )}
      {replyOpen && (
        <div className="reply-form" style={{ marginLeft: 44 }}>
          <input className="field" placeholder="Escribe tu respuesta..." value={replyText} onChange={e => setReplyText(e.target.value)} />
          <button className="btn btn-solid btn-sm" onClick={() => { if (replyText.trim()) { onReply(c, replyText.trim()); setReplyText(""); setReplyOpen(false); } }}>Enviar</button>
        </div>
      )}
    </div>
  );
}

function Comments() {
  const { user, openAuth, toast, openProfile, userDirectory } = useApp();
  const [comments, setComments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [text, setText] = useState("");

  const load = useCallback(async () => {
    if (!window.fb) return;
    setLoading(true);
    const r = await window.fb.getComments();
    setComments(r.success ? r.data : []);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const enriched = comments.map(c => ({
    ...c,
    authorAvatar: userDirectory[c.authorId]?.avatar || "",
    authorRank: userDirectory[c.authorId]?.isAdmin ? "admin" : userDirectory[c.authorId]?.rank
  }));

  async function submit() {
    if (!user) return openAuth();
    if (!text.trim()) return;
    const r = await window.fb.addComment(text.trim(), user.uid, user.username);
    if (r.success) { setText(""); toast("¡Comentario publicado!"); load(); }
    else toast(r.error || "Error al publicar", "error");
  }
  async function toggleReaction(c, field) {
    if (!user) return openAuth();
    const other = field === "likes" ? "dislikes" : "likes";
    const has = (c[field] || []).includes(user.uid);
    if (has) await window.fb.updateComment(c.id, field, user.uid, "arrayRemove");
    else {
      if ((c[other] || []).includes(user.uid)) await window.fb.updateComment(c.id, other, user.uid, "arrayRemove");
      await window.fb.updateComment(c.id, field, user.uid, "arrayUnion");
    }
    load();
  }
  async function reply(c, replyText) {
    if (!user) return openAuth();
    const replies = [...(c.replies || []), { id: Date.now().toString(), author: user.username, authorId: user.uid, text: replyText, date: new Date().toISOString() }];
    await window.fb.updateComment(c.id, "replies", replies, "set");
    load();
  }
  async function editC(c) {
    const t = prompt("Edita tu comentario:", c.text);
    if (t && t.trim()) { await window.fb.updateComment(c.id, "text", t.trim(), "set"); load(); }
  }
  async function delC(c) {
    if (!confirm("¿Eliminar este comentario?")) return;
    const r = await window.fb.deleteComment(c.id, user?.uid);
    if (r.success) { toast("Comentario eliminado"); load(); } else toast(r.error, "error");
  }

  return (
    <section id="comments" className="section">
      <div className="wrap">
        <div className="section-head rv vis"><span className="eyebrow">// Comunidad</span><h2>Lo que dice la gente</h2><p>Comparte tu experiencia y conversa con otros usuarios.</p></div>
        <div className="comment-banner">
          <i className="fas fa-circle-info"></i>
          <p>Los comentarios se archivan automáticamente cada <strong>10 días</strong> para mantener la conversación fresca.</p>
        </div>
        <div className="panel" style={{ padding: 24 }}>
          {loading ? (
            <div className="text-dim" style={{ textAlign: "center", padding: 30 }}><i className="fas fa-spinner fa-spin"></i> Cargando...</div>
          ) : enriched.length === 0 ? (
            <div className="text-dim" style={{ textAlign: "center", padding: 30 }}>💬 Sé el primero en comentar.</div>
          ) : (
            <div className="comment-list">
              {enriched.map(c => (
                <CommentItem key={c.id} c={c} onLike={c2 => toggleReaction(c2, "likes")} onDislike={c2 => toggleReaction(c2, "dislikes")}
                  onReply={reply} onEdit={editC} onDelete={delC} onOpenProfile={openProfile} />
              ))}
            </div>
          )}
          {user ? (
            <div className="compose">
              <div className="c-avatar">{user.avatar ? <img src={user.avatar} /> : user.username[0].toUpperCase()}</div>
              <div style={{ flex: 1 }}>
                <textarea className="field" rows="3" placeholder="Escribe tu opinión..." value={text} onChange={e => setText(e.target.value)}></textarea>
                <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
                  <button className="btn btn-solid btn-sm" onClick={submit}><i className="fas fa-paper-plane"></i> Publicar</button>
                </div>
              </div>
            </div>
          ) : (
            <div className="locked-box"><i className="fas fa-lock"></i><p style={{marginBottom:14}}>Inicia sesión para dejar tu comentario</p><button className="btn btn-ghost btn-sm" onClick={openAuth}>Iniciar sesión</button></div>
          )}
        </div>
      </div>
    </section>
  );
}

/* ============================================================
   FORUM
   ============================================================ */
function Forum() {
  const { user, openAuth, toast } = useApp();
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [title, setTitle] = useState(""); const [desc, setDesc] = useState("");
  const [imgTab, setImgTab] = useState("url"); const [imgUrl, setImgUrl] = useState(""); const [imgData, setImgData] = useState(null);
  const [editing, setEditing] = useState(null);

  const load = useCallback(async () => {
    if (!window.fb) return;
    setLoading(true);
    const r = await window.fb.getPosts();
    setPosts(r.success ? r.data : []);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  function handleFile(file) {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) return toast("Imagen demasiado grande (máx 8MB)", "error");
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > 1600 || h > 1600) { const r = Math.min(1600 / w, 1600 / h); w *= r; h *= r; }
        const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        setImgData(canvas.toDataURL("image/jpeg", 0.9));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function submit() {
    if (!user) return openAuth();
    if (!title.trim() || !desc.trim()) return toast("Completa título y descripción", "error");
    const image = imgTab === "url" ? imgUrl.trim() : (imgData || "");
    const r = await window.fb.addPost(title.trim(), desc.trim(), image, user.uid, user.username);
    if (r.success) { setTitle(""); setDesc(""); setImgUrl(""); setImgData(null); toast("¡Publicación creada!"); load(); }
    else toast(r.error, "error");
  }
  async function saveEdit() {
    if (!editing.title.trim() || !editing.desc.trim()) return toast("Completa título y descripción", "error");
    try {
      const ref = window.fb.doc(window.fb.db, "posts", editing.id);
      await window.fb.updateDoc(ref, { title: editing.title, desc: editing.desc, image: editing.image || "" });
      setEditing(null); toast("Publicación actualizada"); load();
    } catch (e) {
      toast(e.message || "Error al actualizar", "error");
    }
  }
  async function del(p) {
    if (!confirm("¿Eliminar esta publicación?")) return;
    const r = await window.fb.deletePost(p.id, user?.uid);
    if (r.success) { toast("Publicación eliminada"); load(); } else toast(r.error, "error");
  }

  return (
    <section id="foro" className="section">
      <div className="wrap">
        <div className="section-head rv vis"><span className="eyebrow">// Foro</span><h2>Comparte con la comunidad</h2><p>Publica capturas, ideas y novedades de tus proyectos con NEXUS.</p></div>

        {user ? (
          <div className="panel forum-form">
            <h4><i className="fas fa-plus-circle" style={{ color: "var(--cyan)" }}></i> Nueva publicación</h4>
            <div className="field-group"><input className="field" placeholder="Título" value={title} onChange={e => setTitle(e.target.value)} /></div>
            <div className="field-group"><textarea className="field" rows="3" placeholder="¿Qué quieres compartir?" value={desc} onChange={e => setDesc(e.target.value)}></textarea></div>
            <div className="tabbtns">
              <button className={`tabbtn ${imgTab==="url"?"active":""}`} onClick={() => setImgTab("url")}><i className="fas fa-link"></i> URL de imagen</button>
              <button className={`tabbtn ${imgTab==="file"?"active":""}`} onClick={() => setImgTab("file")}><i className="fas fa-upload"></i> Subir imagen</button>
            </div>
            {imgTab === "url" ? (
              <div className="field-group"><input className="field" placeholder="https://..." value={imgUrl} onChange={e => setImgUrl(e.target.value)} /></div>
            ) : (
              <div className="dropzone" style={{ marginBottom: 14 }}>
                <input type="file" accept="image/*" onChange={e => handleFile(e.target.files[0])} />
                <i className="fas fa-cloud-arrow-up"></i>
                <p style={{ fontSize: ".82rem" }}>Arrastra o haz clic para subir (máx 8MB)</p>
                {imgData && <img src={imgData} style={{ marginTop: 12, borderRadius: 10, maxHeight: 120 }} />}
              </div>
            )}
            <button className="btn btn-solid btn-block" onClick={submit}><i className="fas fa-plus"></i> Publicar</button>
          </div>
        ) : (
          <div className="locked-box" style={{ marginBottom: 28 }}><p style={{marginBottom:14}}>Inicia sesión para crear publicaciones</p><button className="btn btn-ghost btn-sm" onClick={openAuth}>Iniciar sesión</button></div>
        )}

        {loading ? (
          <div className="text-dim" style={{ textAlign: "center", padding: 30 }}><i className="fas fa-spinner fa-spin"></i> Cargando...</div>
        ) : posts.length === 0 ? (
          <div className="text-dim" style={{ textAlign: "center", padding: 30 }}>Sé el primero en publicar 🚀</div>
        ) : (
          <div className="forum-grid">
            {posts.map(p => {
              const isOwner = user && p.authorId === user.uid;
              return (
                <div className="forum-card" key={p.id}>
                  {isOwner && (
                    <div className="forum-actions">
                      <button style={{ background: "rgba(79,216,255,.25)", color: "var(--cyan)" }} onClick={() => setEditing({ ...p })}><i className="fas fa-pen"></i></button>
                      <button style={{ background: "rgba(255,93,106,.25)", color: "var(--danger)" }} onClick={() => del(p)}><i className="fas fa-trash"></i></button>
                    </div>
                  )}
                  {p.image ? <img className="forum-img" src={p.image} onError={e => { e.target.outerHTML = '<div class="forum-img-ph"><i class="fas fa-image"></i></div>'; }} /> : <div className="forum-img-ph"><i className="fas fa-image"></i></div>}
                  <div className="forum-body">
                    <h4>{p.title}</h4>
                    <p>{p.desc.length > 130 ? p.desc.slice(0, 130) + "…" : p.desc}</p>
                    <div className="forum-meta"><span><i className="fas fa-user"></i> {p.author}</span><span><i className="fas fa-calendar"></i> {new Date(p.date).toLocaleDateString()}</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {editing && (
        <div className="overlay open" onClick={e => e.target === e.currentTarget && setEditing(null)}>
          <div className="modal" style={{ maxWidth: 440 }}>
            <button className="modal-x" onClick={() => setEditing(null)}><i className="fas fa-times"></i></button>
            <h3>Editar publicación</h3>
            <div className="field-group" style={{marginTop:18}}><span className="field-label">Título</span><input className="field" value={editing.title} onChange={e => setEditing({ ...editing, title: e.target.value })} /></div>
            <div className="field-group"><span className="field-label">Descripción</span><textarea className="field" rows="4" value={editing.desc} onChange={e => setEditing({ ...editing, desc: e.target.value })}></textarea></div>

/* ============================================================
   AUTH MODAL
   ============================================================ */
function AuthModal() {
  const { authOpen, closeAuth, setUser, toast } = useApp();
  const [tab, setTab] = useState("login");
  const [busy, setBusy] = useState(false);
  const [status, setStatus] = useState(null);
  const [loginEmail, setLoginEmail] = useState(""); const [loginPass, setLoginPass] = useState("");
  const [regName, setRegName] = useState(""); const [regEmail, setRegEmail] = useState(""); const [regPass, setRegPass] = useState("");

  if (!authOpen) return null;

  async function afterAuth(u) { setUser({ ...u, avatar: u.avatar || u.photoURL || "" }); closeAuth(); toast(`¡Bienvenido, ${u.username}!`); }

  async function doLogin() {
    if (!window.fb) return setStatus({ type: "error", msg: "Firebase no disponible" });
    setBusy(true); setStatus(null);
    const r = await window.fb.loginUser(loginEmail.trim(), loginPass);
    setBusy(false);
    if (r.success) afterAuth(r.user); else setStatus({ type: "error", msg: r.error });
  }
  async function doRegister() {
    if (!window.fb) return setStatus({ type: "error", msg: "Firebase no disponible" });
    setBusy(true); setStatus(null);
    const r = await window.fb.registerUser(regEmail.trim(), regPass, regName.trim());
    setBusy(false);
    if (r.success) afterAuth(r.user); else setStatus({ type: "error", msg: r.error });
  }
  async function doGoogle() {
    if (!window.fb) return;
    const r = await window.fb.loginWithGoogle();
    if (r.success) afterAuth(r.user); else setStatus({ type: "error", msg: r.error });
  }
  async function doGithub() {
    if (!window.fb) return;
    const r = await window.fb.loginWithGithub();
    if (r.success) afterAuth(r.user); else setStatus({ type: "error", msg: r.error });
  }
  async function forgotPass() {
    if (!loginEmail.trim()) return setStatus({ type: "error", msg: "Ingresa tu correo primero" });
    const r = await window.fb.resetPassword(loginEmail.trim());
    setStatus(r.success ? { type: "success", msg: "📧 Revisa tu correo" } : { type: "error", msg: r.error });
  }

  return (
    <div className="overlay open" onClick={e => e.target === e.currentTarget && closeAuth()}>
      <div className="modal auth-modal">
        <button className="modal-x" onClick={closeAuth}><i className="fas fa-times"></i></button>
        <div className="auth-split">
          <div className="auth-visual">
            <CoreOrb size={110} state="idle" />
            <p>Precisión de ingeniero,<br />para cada asistente</p>
            <span>NEXUS · 157 TEAM</span>
          </div>
          <div className="auth-side">
            <h3>{tab === "login" ? "Bienvenido de nuevo" : "Crear cuenta"}</h3>
            <p className="modal-sub">{tab === "login" ? "Accede a tu cuenta de 157 Team" : "Únete a la comunidad de NEXUS"}</p>
            <div className="auth-tabs2">
              <button className={tab==="login"?"active":""} onClick={() => setTab("login")}>Iniciar sesión</button>
              <button className={tab==="register"?"active":""} onClick={() => setTab("register")}>Crear cuenta</button>
            </div>
            <div className="oauth-row">
              <button className="oauth-btn" onClick={doGoogle}><i className="fab fa-google" style={{color:"#ea4335"}}></i> Continuar con Google</button>
              <button className="oauth-btn" onClick={doGithub}><i className="fab fa-github"></i> Continuar con GitHub</button>
            </div>
            <div className="or-div">o</div>
            {tab === "login" ? (
              <React.Fragment>
                <div className="field-group"><span className="field-label">Correo</span><input className="field" type="email" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} /></div>
                <div className="field-group"><span className="field-label">Contraseña</span><input className="field" type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} /></div>
                <button className="btn btn-solid btn-block" disabled={busy} onClick={doLogin}>{busy ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-right-to-bracket"></i>} Iniciar sesión</button>
                <div className="auth-links"><a onClick={forgotPass}>¿Olvidaste tu contraseña?</a><span>¿Sin cuenta? <a onClick={()=>setTab("register")}>Créala</a></span></div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="field-group"><span className="field-label">Usuario</span><input className="field" value={regName} onChange={e=>setRegName(e.target.value)} /></div>
                <div className="field-group"><span className="field-label">Correo</span><input className="field" type="email" value={regEmail} onChange={e=>setRegEmail(e.target.value)} /></div>
                <div className="field-group"><span className="field-label">Contraseña</span><input className="field" type="password" placeholder="Mínimo 6 caracteres" value={regPass} onChange={e=>setRegPass(e.target.value)} /></div>
                <button className="btn btn-solid btn-block" disabled={busy} onClick={doRegister}>{busy ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-user-plus"></i>} Crear cuenta</button>
                <div className="auth-links"><span>¿Ya tienes cuenta? <a onClick={()=>setTab("login")}>Inicia sesión</a></span></div>
              </React.Fragment>
            )}
            {status && <div className={`status-msg show ${status.type}`}>{status.msg}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   PROFILE MODAL
   ============================================================ */
function ProfileModal() {
  const { profileUid, closeProfile, user, isAdmin, toast, setUser, openLogout } = useApp();
  const [data, setData] = useState(null);
  const [bio, setBio] = useState(""); const [badgeInput, setBadgeInput] = useState(""); const [badges, setBadges] = useState([]);

  useEffect(() => {
    if (!profileUid || !window.fb) return;
    (async () => {
      const r = await window.fb.getUserProfile(profileUid);
      if (r.success) { setData(r.data); setBio(r.data.bio || ""); setBadges(r.data.badges || []); }
      else toast("Usuario no encontrado", "error");
    })();
  }, [profileUid]);

  if (!profileUid) return null;
  const isOwn = user && user.uid === profileUid;
  const rank = data?.rank || "member";
  const rankLabel = { admin: "Admin", moderator: "Moderador", collaborator: "Colaborador", member: "Member" }[rank];
  const rankColor = { admin: "var(--danger)", moderator: "var(--amber)", collaborator: "var(--cyan)", member: "var(--text-dim)" }[rank];

  async function save() {
    const payload = { bio: bio || "Sin descripción aún", badges };
    const r = await window.fb.saveUserProfile(profileUid, payload);
    if (r.success) {
      toast("Perfil guardado");
      if (isOwn) setUser({ ...user, bio: payload.bio, badges: payload.badges });
      closeProfile();
    } else toast(r.error, "error");
  }
  async function setRank(newRank) {
    const r = await window.fb.saveUserProfile(profileUid, { rank: newRank });
    if (r.success) { toast(`Rango actualizado a ${newRank}`); setData({ ...data, rank: newRank }); }
    else toast(r.error, "error");
  }

  return (
    <div className="overlay open" onClick={e => e.target === e.currentTarget && closeProfile()}>
      <div className="modal" style={{ maxWidth: 440 }}>
        <button className="modal-x" onClick={closeProfile}><i className="fas fa-times"></i></button>
        {!data ? <div style={{textAlign:"center",padding:40}}><i className="fas fa-spinner fa-spin"></i></div> : (
          <React.Fragment>
            <div className="profile-avatar-lg">{data.avatar ? <img src={data.avatar} /> : (data.username||"?")[0].toUpperCase()}</div>
            <div className="p-name">{data.username}</div>
            <span className="role-pill" style={{ background: `${rankColor}22`, color: rankColor }}>{rankLabel}</span>
            <div className="p-bio">{isOwn ? null : (data.bio || "Sin descripción aún")}</div>
            {!isOwn && (data.badges||[]).length>0 && <div className="badge-row">{data.badges.map(b=><span className="badge-chip" key={b}>{b}</span>)}</div>}

            {isOwn && (
              <React.Fragment>
                <div className="field-group"><textarea className="field" rows="3" placeholder="Escribe algo sobre ti..." value={bio} onChange={e=>setBio(e.target.value)}></textarea></div>
                <div className="badge-row">{badges.map((b,i)=><span className="badge-chip" key={i}>{b} <i className="fas fa-times" style={{cursor:"pointer",marginLeft:6}} onClick={()=>setBadges(badges.filter((_,idx)=>idx!==i))}></i></span>)}</div>
                <div className="flex gap-2" style={{marginBottom:14}}>
                  <input className="field" placeholder="Agregar insignia" value={badgeInput} onChange={e=>setBadgeInput(e.target.value)} />
                  <button className="btn btn-ghost btn-sm" onClick={()=>{ if(badgeInput.trim()){ setBadges([...badges, badgeInput.trim()]); setBadgeInput(""); } }}><i className="fas fa-plus"></i></button>
                </div>
                <div className="flex gap-2">
                  <button className="btn btn-solid" style={{ flex: 1 }} onClick={save}><i className="fas fa-save"></i> Guardar perfil</button>
                  <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => { closeProfile(); openLogout(); }}><i className="fas fa-right-from-bracket"></i> Cerrar sesión</button>
                </div>
              </React.Fragment>
            )}

            {isAdmin && !isOwn && (
              <div style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--border)" }}>
                <span className="field-label">Asignar rango (admin)</span>
                <div className="rank-row">
                  {["member","collaborator","moderator","admin"].map(rk => (
                    <button key={rk} className={`rank-btn ${rank===rk?"active":""}`} onClick={()=>setRank(rk)}>{rk}</button>
                  ))}
                </div>
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [user, setUser] = useState(null);
  const [theme, setTheme] = useState(localStorage.getItem("nx_theme") || "dark");
  const [authOpen, setAuthOpen] = useState(false);
  const [profileUid, setProfileUid] = useState(null);
  const [cartOpen, setCartOpen] = useState(false);
  const [adminOpen, setAdminOpen] = useState(false);
  const [cart, setCart] = useState([]);
  const [currency, setCurrency] = useState("USD");
  const [toasts, setToasts] = useState([]);
  const [userDirectory, setUserDirectory] = useState({});

  useEffect(() => { document.body.classList.toggle("light", theme === "light"); localStorage.setItem("nx_theme", theme); }, [theme]);

  function toast(msg, type = "success") {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }

  const refreshDirectory = useCallback(async () => {
    if (!window.fb) return;
    const r = await window.fb.getAllUsers();
    if (r.success) {
      const map = {};
      r.data.forEach(u => map[u.id] = u);
      setUserDirectory(map);
    }
  }, []);

  useEffect(() => {
    function start() {
      if (window.fb && window.fb.onAuthChange) {
        window.fb.onAuthChange(u => { setUser(u); refreshDirectory(); });
      }
      refreshDirectory();
    }
    if (window.fbReady) start();
    else { window.addEventListener("fb-ready", start, { once: true }); window.addEventListener("fb-error", start, { once: true }); }
  }, [refreshDirectory]);

  useEffect(() => {
    const obs = new IntersectionObserver(entries => entries.forEach(e => e.isIntersecting && e.target.classList.add("vis")), { threshold: 0.1 });
    document.querySelectorAll(".rv").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  function addToCart(product) {
    setCart(c => {
      const ex = c.find(i => i.id === product.id);
      if (ex) return c.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
      return [...c, { ...product, quantity: 1 }];
    });
  }
  function decCart(id) { setCart(c => c.map(i => i.id === id ? { ...i, quantity: Math.max(1, i.quantity - 1) } : i)); }
  function removeCart(id) { setCart(c => c.filter(i => i.id !== id)); }

  async function handleLogout() {
    if (window.fb) await window.fb.logoutUser();
    setUser(null); toast("Sesión cerrada");
  }

  const ctx = {
    user, setUser, isAdmin: !!(user && user.isAdmin),
    theme, toggleTheme: () => setTheme(t => t === "dark" ? "light" : "dark"),
    authOpen, openAuth: () => setAuthOpen(true), closeAuth: () => setAuthOpen(false),
    profileUid, openProfile: (uid) => setProfileUid(uid), closeProfile: () => setProfileUid(null),
    cartOpen, openCart: () => setCartOpen(true), closeCart: () => setCartOpen(false),
    adminOpen, openAdmin: () => setAdminOpen(true), closeAdmin: () => setAdminOpen(false),
    cart, addToCart, decCart, removeCart,
    currency, setCurrency,
    toast, userDirectory,
    openLogout: handleLogout,
  };

  return (
    <AppCtx.Provider value={ctx}>
      <Header />
      <main>
        <Hero />
        <StatBar />
        <Carousel />
        <Products />
        <Comments />
        <Forum />
        <Features />
        <Team />
        <DiscordBanner />
      </main>
      <Footer />
      <AuthModal />
      <ProfileModal />
      <CartDrawer />
      <AdminPanel />
      <ToastStack toasts={toasts} />
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
